<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RetainIQ — Dashboard & Outputs</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
    color:#0F172A;background:#FFFFFF;line-height:1.5;
    -webkit-font-smoothing:antialiased;
  }
  .container{max-width:1180px;margin:0 auto;padding:40px 24px 64px}
  h1{
    font-size:28px;font-weight:800;letter-spacing:-0.01em;margin-bottom:6px;
  }
  .sub{color:#64748B;font-size:15px;margin-bottom:32px}
  .sub a{color:#E84545;text-decoration:none;font-weight:600}
  .sub a:hover{text-decoration:underline}
  .dashboard{
    border:1px solid #E2E8F0;border-radius:12px;overflow:hidden;
    box-shadow:0 4px 24px rgba(15,23,42,0.06);
  }
  .dashboard img{width:100%;display:block}
  .downloads{
    display:grid;grid-template-columns:repeat(3,1fr);gap:14px;
    margin-top:24px;
  }
  .download{
    display:block;background:#F8FAFC;border:1px solid #E2E8F0;
    border-radius:10px;padding:18px 20px;text-decoration:none;color:#0F172A;
    transition:border-color 0.15s,transform 0.15s;
  }
  .download:hover{border-color:#E84545;transform:translateY(-1px)}
  .download-type{
    font-size:11px;font-weight:700;letter-spacing:1px;color:#E84545;margin-bottom:6px;
  }
  .download-title{font-size:15px;font-weight:600}
  @media (max-width:680px){
    .downloads{grid-template-columns:1fr}
  }
</style>
</head>
<body>
<div class="container">
  <h1>RetainIQ — Subscription Churn &amp; LTV Dashboard</h1>
  <p class="sub">D2C furniture-rental case study. Source &amp; method on <a href="https://github.com/sakshirajpal17/RetainIQ" target="_blank" rel="noopener">GitHub</a>.</p>

  <div class="dashboard">
    <img src="outputs/Furlenco_Churn_Dashboard.png" alt="Furlenco Churn &amp; LTV Dashboard">
  </div>

  <div class="downloads">
    <a class="download" href="outputs/Furlenco_Churn_Dashboard.pdf" target="_blank">
      <div class="download-type">PDF · DASHBOARD</div>
      <div class="download-title">Full dashboard ↗</div>
    </a>
    <a class="download" href="outputs/Furlenco_Exec_Summary.pdf" target="_blank">
      <div class="download-type">PDF · 1-PAGE</div>
      <div class="download-title">Executive summary ↗</div>
    </a>
    <a class="download" href="outputs/Furlenco_Churn_Dashboard.png" target="_blank">
      <div class="download-type">PNG · HIGH-RES</div>
      <div class="download-title">Dashboard image ↗</div>
    </a>
  </div>
</div>
</body>
</html>
